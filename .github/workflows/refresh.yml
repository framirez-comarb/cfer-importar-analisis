name: CFER Importar — Refresh diario

on:
  schedule:
    # 11:00 UTC = 08:00 ART (Argentina UTC-3, sin DST). Lunes a viernes.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesita para commitear los outputs regenerados
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore service account JSON
        env:
          SA_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > sa.json
          # Validacion minima: que sea JSON parseable
          python -c "import json; json.load(open('sa.json'))" || { echo "❌ sa.json no es JSON valido"; exit 1; }

      - name: Run analisis
        env:
          GA4_PROPERTY_ID: "373855714"
          GA4_SA_PATH: ./sa.json
          FECHA_DESDE: "2025-06-01"
        run: python -m src.main

      - name: Cleanup credentials
        if: always()
        run: rm -f sa.json

      - name: Commit outputs si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # commit + push solo si hay diff staged (evita commits vacios)
          if ! git diff --cached --quiet; then
            git commit -m "Refresh outputs $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Sin cambios en output/; nada para commitear."
          fi
